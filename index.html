<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Glow Salon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #1e1e2f, #2c2c54);
  color: white;
  overflow-x: hidden;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 40px;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  margin: 15px 0;
  opacity: 0.8;
}

.btn {
  padding: 12px 25px;
  margin: 10px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  transition: 0.3s;
  font-weight: 500;
}

.whatsapp {
  background: #25D366;
}

.maps {
  background: #4285F4;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,255,255,0.4);
}

.glass {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  backdrop-filter: blur(10px);
  padding: 20px;
  transition: 0.3s;
}

.glass:hover {
  transform: translateY(-8px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
  padding: 40px;
}

.section {
  padding: 60px 20px;
  text-align: center;
}

.floating-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  font-size: 20px;
  color: white;
}

.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<header>
  <div class="logo">Urban Glow</div>
</header>

<section class="hero fade">
  <h1>Your Beauty, Our Passion</h1>
  <p>Premium salon services in Chennai</p>

  <a href="https://wa.me/919361449850">
    <button class="btn whatsapp">WhatsApp Us</button>
  </a>

  <a href="https://maps.google.com">
    <button class="btn maps">Find Us</button>
  </a>
</section>

<section class="section fade">
  <h2>Our Services</h2>

  <div class="services">
    <div class="glass">Haircut & Styling</div>
    <div class="glass">Facial & Skincare</div>
    <div class="glass">Bridal Makeup</div>
    <div class="glass">Hair Coloring</div>
  </div>
</section>

<section class="section fade">
  <div class="glass">
    <h2>Why Choose Us?</h2>
    <p>✔ Expert stylists<br>
       ✔ Affordable pricing<br>
       ✔ Hygienic setup<br>
       ✔ 100% satisfaction</p>
  </div>
</section>

<footer class="section">
  <p>📍 Chennai, Tamil Nadu</p>
  <p>📞 +91 93614 49850</p>
</footer>

<a href="https://wa.me/919361449850" class="floating-btn">💬</a>

<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const rect = el.getBoundingClientRect().top;
    if (rect < window.innerHeight - 100) {
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
